<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dice</title>
    <style>
        body
        {
            margin:0;
            background-color:honeydew;
            width:100%;
            height:100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        h1
        {
            font-size: 50px;
        }

        button
        {
            font-size: 30px;
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <h1>Dice Roller</h1>
    <button onclick="rollDice()">Roll</button>
    <script>
        function rollDice() {
            const result = Math.floor(Math.random() * 6) + 1;
            alert("Your number: "+result);
        }
    </script>
</body>
</html>
